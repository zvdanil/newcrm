[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build --workspace=frontend && npm run build --workspace=backend"

[deploy]
startCommand = "node db/migrate.js && node backend/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
